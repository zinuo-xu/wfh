name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Run lint
        run: golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite3

      - name: Build
        run: go build -v ./cmd/wfh

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -count=1 ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build all platforms
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o wfh-linux-amd64 ./cmd/wfh
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -o wfh-darwin-amd64 ./cmd/wfh
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -o wfh-darwin-arm64 ./cmd/wfh
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build -o wfh-windows-amd64.exe ./cmd/wfh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wfh-binaries
          path: wfh-*
